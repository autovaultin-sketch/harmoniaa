name: Build Installers

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            script: dist:mac
          - os: windows-latest
            label: Windows
            script: dist:win
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmonia-${{ matrix.label }}
          path: |
            release/*.dmg
            release/*.zip
            release/*Setup*.exe
            release/*Portable*.exe
            release/*.exe
          if-no-files-found: warn
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
